# docker-compose.yml
# Run from the repo root:   docker compose -f infra/docker-compose.yml up
#
# Single service with both CPU and I/O caps:
#   4 cores, 400 MB/s read+write
#
# Note: blkio limits require Linux with root and a real block device path.
# Find yours on your Cloudlab node with: lsblk
# Common values: /dev/sda, /dev/sdb, /dev/nvme0n1
# These limits are NOT enforced on Mac Docker Desktop; run on Cloudlab for real experiments.

version: "3.8"

services:

  experiment:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    cpus: "4.0"
    mem_limit: "4g"
    blkio_config:
      device_write_bps:
        - path: ${BLOCK_DEVICE:-/dev/sda}
          rate: "1000mb"
      device_read_bps:
        - path: ${BLOCK_DEVICE:-/dev/sda}
          rate: "1000mb"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../results:/app/results
    command: >
      --mode      ${MODE:-full}
      --duration  ${DURATION:-30}
      --io-mix    ${IO_MIX:-0.3}
      --intensity ${INTENSITY:-0.75}
      --output    results/experiment.json
